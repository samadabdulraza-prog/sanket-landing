  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

var(--text2,#8B909B);line-height:1.5\">On <span style=\"color:var(--text,#ECE7DB)\">₹2,00,000<\u002Fspan> capital, risking <span style=\"color:var(--text,#ECE7DB)\">1%<\u002Fspan> (₹2,000)<\u002Fdiv>\n          <div style=\"font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:var(--text,#ECE7DB);margin-top:7px\">Buy <span style=\"color:var(--accHi,#F4D582)\">117 shares<\u002Fspan> <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted,#565B64)\">≈ ₹46,215 deployed<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"max-width:760px;margin:0 auto;padding:30px 24px 40px\">\n    <div data-reveal=\"1\" style=\"padding:44px 0\">\n      <div style=\"display:flex;gap:12px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc,#C9A24B);margin-bottom:14px\"><span style=\"color:var(--muted,#565B64)\">01<\u002Fspan> the pitch you've heard<\u002Fdiv>\n      <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(23px,3.6vw,33px);line-height:1.12;letter-spacing:-.015em;color:var(--text,#ECE7DB);margin:0 0 14px\">\"₹1,000 a day. Guaranteed.\"<\u002Fh3>\n      <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;max-width:60ch;margin:0\">Every guru sells the same fantasy — and not one of them tells you what it costs when they're wrong. <span style=\"color:var(--text,#ECE7DB)\">Sanket starts with the opposite question:<\u002Fspan> what are you risking, and can you survive being wrong?<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"padding:44px 0;border-top:1px solid var(--line,#20232B)\">\n      <div style=\"display:flex;gap:12px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc,#C9A24B);margin-bottom:14px\"><span style=\"color:var(--muted,#565B64)\">02<\u002Fspan> clarity in the chaos<\u002Fdiv>\n      <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(23px,3.6vw,33px);line-height:1.12;letter-spacing:-.015em;color:var(--text,#ECE7DB);margin:0 0 14px\">The market is noise. Sanket is the signal.<\u002Fh3>\n      <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;max-width:60ch;margin:0\">Hundreds of stocks, a thousand opinions, a dozen screens shouting at once. Sanket reads through all of it and gives you <span style=\"color:var(--text,#ECE7DB)\">one clear call<\u002Fspan> — what deserves your attention right now, and what's just noise dressed up as opportunity.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"padding:44px 0;border-top:1px solid var(--line,#20232B)\">\n      <div style=\"display:flex;gap:12px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc,#C9A24B);margin-bottom:14px\"><span style=\"color:var(--muted,#565B64)\">03<\u002Fspan> risk, handled first<\u002Fdiv>\n      <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(23px,3.6vw,33px);line-height:1.12;letter-spacing:-.015em;color:var(--text,#ECE7DB);margin:0 0 14px\">Every call comes with its leash.<\u002Fh3>\n      <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;max-width:60ch;margin:0\">A signal you can't size is just a guess in a nicer font. Every Sanket call lands with <span style=\"color:var(--text,#ECE7DB)\">a position size and a line in the sand<\u002Fspan> — so one bad trade is a scratch, never a wipeout. You don't blow up your account on a single mistake. Not on our watch.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"1\" style=\"padding:44px 0;border-top:1px solid var(--line,#20232B)\">\n      <div style=\"display:flex;gap:12px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc,#C9A24B);margin-bottom:14px\"><span style=\"color:var(--muted,#565B64)\">04<\u002Fspan> an edge, not a promise<\u002Fdiv>\n      <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(23px,3.6vw,33px);line-height:1.12;letter-spacing:-.015em;color:var(--text,#ECE7DB);margin:0 0 14px\">We won't tell you you'll be rich by Friday.<\u002Fh3>\n      <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;max-width:60ch;margin:0\">Sanket doesn't sell the moon. It hands you sharp, sized calls and an edge that's <span style=\"color:var(--text,#ECE7DB)\">actually in your corner<\u002Fspan> when the market gets loud — the quiet confidence that keeps you in the game long enough to win.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"how\" style=\"border-top:1px solid var(--line,#20232B);padding:80px 24px\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"1\" style=\"max-width:620px;margin:0 auto;text-align:center\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--acc,#C9A24B)\">How it works<\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,4.4vw,42px);line-height:1.08;letter-spacing:-.02em;color:var(--text,#ECE7DB);margin:14px 0\">Three lenses in. <em style=\"font-style:normal;color:var(--accHi,#F4D582)\">One sized call out.<\u002Fem><\u002Fh2>\n        <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;margin:0 auto;max-width:56ch\">Sanket looks at every stock the way a disciplined desk would — through three lenses at once — then turns that read into a single call with the risk already worked out.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"1\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:42px\">\n        <div style=\"background:var(--tile,#0B0C11);border:1px solid var(--line,#1E212B);border-radius:16px;padding:26px 24px;transition:transform .25s,border-color .25s,background-color .4s\" style-hover=\"transform:translateY(-3px);border-color:var(--accLine,rgba(201,162,75,.4))\">\n          <div style=\"width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--accFaint,rgba(201,162,75,.1));border:1px solid var(--accLine,rgba(201,162,75,.22));margin-bottom:18px;font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--accHi,#F4D582)\">B<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:20px;color:var(--text,#ECE7DB);margin:0 0 9px;letter-spacing:-.01em\">The business<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.58;margin:0\">Is the company underneath actually healthy? Earnings, balance sheet, and quality — so you're not building on sand.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--tile,#0B0C11);border:1px solid var(--line,#1E212B);border-radius:16px;padding:26px 24px;transition:transform .25s,border-color .25s,background-color .4s\" style-hover=\"transform:translateY(-3px);border-color:var(--accLine,rgba(201,162,75,.4))\">\n          <div style=\"width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--accFaint,rgba(201,162,75,.1));border:1px solid var(--accLine,rgba(201,162,75,.22));margin-bottom:18px;font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--accHi,#F4D582)\">T<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:20px;color:var(--text,#ECE7DB);margin:0 0 9px;letter-spacing:-.01em\">The technicals<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.58;margin:0\">What is price actually doing? Trend, structure, and the setup — where the entry, stop, and target really sit.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--tile,#0B0C11);border:1px solid var(--line,#1E212B);border-radius:16px;padding:26px 24px;transition:transform .25s,border-color .25s,background-color .4s\" style-hover=\"transform:translateY(-3px);border-color:var(--accLine,rgba(201,162,75,.4))\">\n          <div style=\"width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--accFaint,rgba(201,162,75,.1));border:1px solid var(--accLine,rgba(201,162,75,.22));margin-bottom:18px;font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--accHi,#F4D582)\">M<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:20px;color:var(--text,#ECE7DB);margin:0 0 9px;letter-spacing:-.01em\">The market<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.58;margin:0\">Is the wider tide with you or against you? A great setup in a falling market gets a lower conviction — and an honest one.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"1\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px\">\n        <div style=\"position:relative;padding:24px 22px;border:1px solid var(--line,#1E212B);border-radius:16px;background:linear-gradient(180deg,var(--card1,#13151B),var(--card2,#0C0D11))\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--acc,#C9A24B);letter-spacing:.1em\">01 · Idea<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:19px;color:var(--text,#ECE7DB);margin:10px 0 8px\">Find the setup<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14px;line-height:1.55;margin:0\">The three lenses agree on a name worth your attention — and Sanket says so plainly, or stays quiet.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:24px 22px;border:1px solid var(--line,#1E212B);border-radius:16px;background:linear-gradient(180deg,var(--card1,#13151B),var(--card2,#0C0D11))\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--acc,#C9A24B);letter-spacing:.1em\">02 · Size<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:19px;color:var(--text,#ECE7DB);margin:10px 0 8px\">Risk it first<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14px;line-height:1.55;margin:0\">Before the idea counts, the position is sized to a small slice of your capital — the loss is decided up front.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:24px 22px;border:1px solid var(--line,#1E212B);border-radius:16px;background:linear-gradient(180deg,var(--card1,#13151B),var(--card2,#0C0D11))\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--acc,#C9A24B);letter-spacing:.1em\">03 · Exit<\u002Fdiv>\n          <h4 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:19px;color:var(--text,#ECE7DB);margin:10px 0 8px\">Set the line<\u002Fh4>\n          <p style=\"color:var(--text2,#8B909B);font-size:14px;line-height:1.55;margin:0\">Entry, target, and a hard stop arrive together. You always know where you're getting out before you get in.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"border-top:1px solid var(--line,#20232B);padding:80px 24px\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"1\" style=\"max-width:620px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--acc,#C9A24B)\">Anatomy of a signal<\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,4.4vw,42px);line-height:1.08;letter-spacing:-.02em;color:var(--text,#ECE7DB);margin:14px 0\">Every call, <em style=\"font-style:normal;color:var(--accHi,#F4D582)\">decoded.<\u002Fem><\u002Fh2>\n        <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;max-width:56ch;margin:0\">Nothing on a Sanket card is decoration. Here's what each line is telling you — and why it's there.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"1\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 48px;margin-top:40px\">\n        <div>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">The call<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">Buy, wait, or pass.<\u002Fb> One word, no hedging. If the read isn't strong enough, the answer is \"pass\" — and that's a feature.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">Conviction<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">How sure, honestly.<\u002Fb> A 0–100 score that's allowed to say \"only moderate.\" A confident number you can't trust is worthless.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">Three lenses<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">The why behind the score.<\u002Fb> Business, technical, and market — so you can see exactly what's driving the call, and what's holding it back.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">Entry<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">Where the setup is valid.<\u002Fb> Not \"buy at any price\" — a specific level where the trade actually makes sense.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">Stop<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">Your line in the sand.<\u002Fb> The price that says the idea was wrong. Decided before you enter, never moved in panic.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line,#20232B)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc,#C9A24B);width:90px;flex-shrink:0;padding-top:2px\">Size<\u002Fdiv><div style=\"color:var(--text2,#8B909B);font-size:14.5px;line-height:1.55\"><b style=\"color:var(--text,#ECE7DB);font-weight:500\">Exactly how many shares.<\u002Fb> Sized so a stop-out costs a small, survivable slice of your capital — typically 1%.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"record\" style=\"border-top:1px solid var(--line,#20232B);padding:80px 24px\">\n    <div style=\"max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"1\" style=\"max-width:640px;margin:0 auto;text-align:center\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--acc,#C9A24B)\">On the record<\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,4.4vw,42px);line-height:1.08;letter-spacing:-.02em;color:var(--text,#ECE7DB);margin:14px 0\">Proof, not promises — <em style=\"font-style:normal;color:var(--accHi,#F4D582)\">wins and losses both.<\u002Fem><\u002Fh2>\n        <p style=\"color:var(--text2,#8B909B);font-size:16px;line-height:1.62;margin:0 auto;max-width:56ch\">Anyone can show you their winners. We show you the stop doing its job too — because a contained loss is the whole point. Every call below carried a defined exit before it was ever taken.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-reveal=\"1\" style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:30px auto 8px;max-width:720px\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--text2,#8B909B);border:1px solid var(--line,#1E212B);border-radius:999px;padding:8px 16px\">A stop on <b style=\"color:var(--accHi,#F4D582);font-weight:500\">every<\u002Fb> call<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--text2,#8B909B);border:1px solid var(--line,#1E212B);border-radius:999px;padding:8px 16px\"><b style=\"color:var(--accHi,#F4D582);font-weight:500\">1%<\u002Fb> max risk per trade<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--text2,#8B909B);border:1px solid var(--line,#1E212B);border-radius:999px;padding:8px 16px\">Exit set <b style=\"color:var(--accHi,#F4D582);font-weight ont-size:15px;line-height:1.65;padding:0 30px 22px 0;max-width:64ch\">Never. Sanket doesn't connect to your broker, hold your funds, or place trades. It shows you analysis and order details only — you place every order yourself, in your own account, at your own discretion.<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-top:1px solid var(--line,#20232B);padding:4px 0\">\n          <summary style=\"cursor:pointer;padding:22px 0;font-family:'Fraunces',serif;font-size:18.5px;font-weight:500;color:var(--text,#ECE7DB);letter-spacing:-.01em\">What happens when a call is wrong?<\u002Fsummary>\n          <div style=\"color:var(--text2,#8B909B);font-size:15px;line-height:1.65;padding:0 30px 22px 0;max-width:64ch\">That's the whole reason the stop and the position size come first. Every call is sized so that being wrong costs a small, survivable slice of your capital — typically around 1%. A bad trade is meant to be a scratch, not a wipeout.<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-top:1px solid var(--line,#20232B);padding:4px 0\">\n          <summary style=\"cursor:pointer;padding:22px 0;font-family:'Fraunces',serif;font-size:18.5px;font-weight:500;color:var(--text,#ECE7DB);letter-spacing:-.01em\">Do you guarantee returns?<\u002Fsummary>\n          <div style=\"color:var(--text2,#8B909B);font-size:15px;line-height:1.65;padding:0 30px 22px 0;max-width:64ch\">No, and we never will. Trading carries real risk, including the loss of your capital. No method removes that. A conviction score is a confidence level, not a prediction, and past results never guarantee future ones.<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-top:1px solid var(--line,#20232B);border-bottom:1px solid var(--line,#20232B);padding:4px 0\">\n          <summary style=\"cursor:pointer;padding:22px 0;font-family:'Fraunces',serif;font-size:18.5px;font-weight:500;color:var(--text,#ECE7DB);letter-spacing:-.01em\">What does it cost?<\u002Fsummary>\n          <div style=\"color:var(--text2,#8B909B);font-size:15px;line-height:1.65;padding:0 30px 22px 0;max-width:64ch\">Nothing during the beta. We're focused on getting it right with our first 100 users. When we do introduce pricing, you'll know well in advance.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-reveal=\"1\" style=\"text-align:center;padding:90px 24px 40px;max-width:820px;margin:0 auto\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--green,#36BE91);margin-bottom:18px\">Clarity before every trade<\u002Fdiv>\n    <h2 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:clamp(28px,5vw,46px);line-height:1.07;max-width:18ch;margin:0 auto 36px;color:var(--text,#ECE7DB)\">Know what to do — and exactly what it risks.<\u002Fh2>\n    <span onclick=\"{{ openJoin }}\" style=\"display:inline-block;font-weight:600;font-size:16px;color:var(--onAcc,#0B0904);background:linear-gradient(var(--accHi,#F4D582),var(--acc,#C9A24B));border-radius:999px;padding:15px 34px;cursor:pointer;box-shadow:0 8px 30px var(--accSoft,rgba(201,162,75,.32));transition:transform .25s\" style-hover=\"transform:translateY(-3px)\">Request access →<\u002Fspan>\n    <p style=\"margin:24px auto 0;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted,#565B64);max-width:52ch;line-height:1.65\">Live in beta · Sanket helps you manage risk — it doesn't erase it · markets carry risk · no guarantee of returns.<\u002Fp>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid var(--line,#20232B);background:var(--panel,#05060A);padding:50px 24px;transition:background-color .4s ease\">\n    <div style=\"max-width:760px;margin:0 auto;text-align:center\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:var(--text,#ECE7DB);margin-bottom:16px\"><span style=\"width:8px;height:8px;border-radius:50%;background:linear-gradient(var(--accHi,#F4D582),var(--acc,#C9A24B))\"><\u002Fspan>Sanket<span style=\"color:var(--acc,#C9A24B);margin-left:-5px\">.<\u002Fspan><\u002Fdiv>\n      <p style=\"color:var(--muted,#565B64);font-size:12.5px;line-height:1.7;max-width:62ch;margin:0 auto 20px\">Sanket provides educational technical analysis and risk-management tools. It is not investment advice, not a recommendation to buy or sell any security, and we are not SEBI-registered. Markets carry risk, and no method removes it. Past results never guarantee future ones. Read the full <a href=\"disclosures.html\" style=\"color:var(--acc,#C9A24B)\">Disclosures<\u002Fa>.<\u002Fp>\n      <div style=\"display:flex;gap:22px;justify-content:center;margin-bottom:16px;flex-wrap:wrap\">\n        <a href=\"#how\" style=\"color:var(--text2,#8B909B);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em\">How it works<\u002Fa>\n        <a href=\"#record\" style=\"color:var(--text2,#8B909B);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em\">Track record<\u002Fa>\n        <a href=\"about.html\" style=\"color:var(--text2,#8B909B);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em\">About<\u002Fa>\n        <a href=\"disclosures.html\" style=\"color:var(--text2,#8B909B);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em\">Disclosures<\u002Fa>\n        <a href=\"mailto:hello@sanketai.in\" style=\"color:var(--text2,#8B909B);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em\">Contact<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted,#565B64);letter-spacing:.12em\">SANKET · LIVE IN BETA · © 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ modalBackdrop }}\" style=\"position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(5,6,8,.8);backdrop-filter:blur(8px)\">\n      <div style=\"background:linear-gradient(180deg,var(--card1,#13151B),var(--card2,#0C0D11));border:1px solid var(--line,#20232B);border-radius:20px;padding:34px 32px;max-width:430px;width:100%;position:relative;box-shadow:0 30px 80px -20px rgba(0,0,0,.7)\">\n        <span onclick=\"{{ closeJoin }}\" style=\"position:absolute;top:12px;right:18px;color:var(--text2,#8B909B);font-size:24px;cursor:pointer;line-height:1\" style-hover=\"color:var(--text,#ECE7DB)\">×<\u002Fspan>\n        <sc-if value=\"{{ notDone }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--acc,#C9A24B)\">Beta · first 100<\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:26px;margin:8px 0 6px;letter-spacing:-.01em;color:var(--text,#ECE7DB)\">Request access<\u002Fh3>\n          <p style=\"color:var(--text2,#8B909B);font-size:14px;line-height:1.5;margin:0 0 22px\">Leave your details and we'll reach out as we open spots.<\u002Fp>\n          <div style=\"margin-bottom:14px\">\n            <label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted,#565B64);margin-bottom:6px\">Name<\u002Flabel>\n            <input ref=\"{{ nameRef }}\" type=\"text\" placeholder=\"Your name\" style=\"width:100%;box-sizing:border-box;background:var(--tile,#0A0B0E);border:1px solid var(--line,#20232B);border-radius:10px;padding:12px 14px;color:var(--text,#ECE7DB);font-family:'Hanken Grotesk',sans-serif;font-size:15px;outline:none\" style-focus=\"border-color:var(--acc,#C9A24B)\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom:14px\">\n            <label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted,#565B64);margin-bottom:6px\">Phone<\u002Flabel>\n            <input ref=\"{{ phoneRef }}\" type=\"tel\" placeholder=\"+91 98765 43210\" style=\"width:100%;box-sizing:border-box;background:var(--tile,#0A0B0E);border:1px solid var(--line,#20232B);border-radius:10px;padding:12px 14px;color:var(--text,#ECE7DB);font-family:'Hanken Grotesk',sans-serif;font-size:15px;outline:none\" style-focus=\"border-color:var(--acc,#C9A24B)\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom:14px\">\n            <label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted,#565B64);margin-bottom:6px\">Email<\u002Flabel>\n            <input ref=\"{{ emailRef }}\" type=\"email\" placeholder=\"you@email.com\" style=\"width:100%;box-sizing:border-box;background:var(--tile,#0A0B0E);border:1px solid var(--line,#20232B);border-radius:10px;padding:12px 14px;color:var(--text,#ECE7DB);font-family:'Hanken Grotesk',sans-serif;font-size:15px;outline:none\" style-focus=\"border-color:var(--acc,#C9A24B)\">\n          <\u002Fdiv>\n          <div onclick=\"{{ submitJoin }}\" style=\"width:100%;box-sizing:border-box;margin-top:8px;text-align:center;font-weight:600;font-size:15px;color:var(--onAcc,#0B0904);background:linear-gradient(var(--accHi,#F4D582),var(--acc,#C9A24B));border-radius:999px;padding:14px;cursor:pointer;box-shadow:0 8px 26px var(--accSoft,rgba(201,162,75,.32));transition:transform .2s\" style-hover=\"transform:translateY(-1px)\">{{ submitLabel }}<\u002Fdiv>\n          <sc-if value=\"{{ joinErr }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"color:var(--red,#E0654E);font-size:13px;margin-top:10px;font-family:'IBM Plex Mono',monospace;line-height:1.45\">{{ joinErr }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted,#565B64);margin:14px 0 0;line-height:1.5;text-align:center\">We'll only use this to contact you about Sanket. See <a href=\"disclosures.html\" style=\"color:var(--acc,#C9A24B)\">Disclosures<\u002Fa>.<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ joinDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:8px 0\">\n            <div style=\"font-size:38px;color:var(--green,#36BE91)\">✓<\u002Fdiv>\n            <h3 style=\"font-family:'Fraunces',serif;font-weight:500;font-size:26px;margin:8px 0 6px;color:var(--text,#ECE7DB)\">You're on the list.<\u002Fh3>\n            <p style=\"color:var(--text2,#8B909B);font-size:14px;line-height:1.5;margin:0\">We'll be in touch soon. Thanks for your interest in Sanket.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    biz: 0, tech: 0, mkt: 0, conv: 0, calls: 0, price: 395.0, up: true,\n    status: 'connecting to desk…', theme: 'dark', accent: 'gold',\n    modalOpen: false, joinDone: false, joinErr: '', submitLabel: 'Request access →'\n  };\n\n  nBase = [120, 126, 138];\n  nAccent = [232, 200, 118];\n\n  accentDefs() {\n    return {\n      gold:    { a: '#C9A24B', hi: '#F4D582', rgb: [201, 162, 75],  hirgb: [232, 200, 118] },\n      emerald: { a: '#10B981', hi: '#34D399', rgb: [16, 185, 129],  hirgb: [52, 211, 153] },\n      azure:   { a: '#3D7EF0', hi: '#6699F5', rgb: [61, 126, 240],  hirgb: [102, 153, 245] },\n      rose:    { a: '#E5566F', hi: '#F07A8E', rgb: [229, 86, 111],  hirgb: [240, 122, 142] }\n    };\n  }\n\n  themeTokens(theme, accent) {\n    const A = this.accentDefs()[accent] || this.accentDefs().gold;\n    const dark = theme !== 'light';\n    const T = dark ? {\n      bg: '#07080C', panel: '#05060A', navbg: 'rgba(7,8,12,.72)', line: '#1E212B',\n      text: '#ECE7DB', text2: '#9BA0AB', muted: '#565B64',\n      card1: 'rgba(19,21,27,.95)', card2: 'rgba(12,13,17,.97)',\n      tile: '#0A0B0E', track: '#1C1F27', green: '#36BE91', red: '#E0654E',\n      vig1: 'rgba(6,7,10,.88)', vig2: 'rgba(6,7,10,.5)', vig3: 'rgba(6,7,10,.12)',\n      lossBg: 'linear-gradient(180deg,#17120F,#0D0B0A)', lossLine: '#3A2A26', lossChip: 'rgba(224,101,78,.4)'\n    } : {\n      bg: '#F4F0E5', panel: '#EFEADD', navbg: 'rgba(244,240,229,.78)', line: '#DDD6C4',\n      text: '#1C1A15', text2: '#5B564A', muted: '#8B8577',\n      card1: '#FFFDF6', card2: '#FBF6EA',\n      tile: '#F4F0E3', track: '#E5DFCE', green: '#11A06F', red: '#B4452F',\n      vig1: 'rgba(244,240,229,.93)', vig2: 'rgba(244,240,229,.58)', vig3: 'rgba(244,240,229,.18)',\n      lossBg: '#FBF3EC', lossLine: '#E4CDBE', lossChip: 'rgba(180,69,47,.4)'\n    };\n    T.acc = A.a;\n    T.accHi = dark ? A.hi : A.a;\n    T.accSoft = 'rgba(' + A.rgb.join(',') + ',.32)';\n    T.accLine = 'rgba(' + A.rgb.join(',') + ',.4)';\n    T.accFaint = 'rgba(' + A.rgb.join(',') + ',.08)';\n    T.onAcc = '#0B0904';\n    return T;\n  }\n\n  wrapRef = (el) => {\n    if (!el) return;\n    this.wrapEl = el;\n    this.applyVars();\n    this.setupReveals();\n  };\n\n  applyVars() {\n    if (!this.wrapEl) return;\n    const T = this.themeTokens(this.state.theme, this.state.accent);\n    for (const k in T) this.wrapEl.style.setProperty('--' + k, T[k]);\n  }\n\n  setupReveals() {\n    if (this.revealsDone || !this.wrapEl) return;\n    this.revealsDone = true;\n    const reduced = typeof matchMedia !== 'undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const els = this.wrapEl.querySelectorAll('[data-reveal]');\n    if (reduced || !('IntersectionObserver' in window)) return;\n    const io = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.15 });\n    els.forEach((el) => {\n      const r = el.getBoundingClientRect();\n      if (r.top < innerHeight) return; // already visible on load — don't hide\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(30px)';\n      el.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n      io.observe(el);\n    });\n  }\n\n  applyPrefs(theme, accent, persist) {\n    this.setState({ theme, accent });\n    const A = this.accentDefs()[accent] || this.accentDefs().gold;\n    this.nBase = theme === 'light' ? [116, 109, 92] : [120, 126, 138];\n    this.nAccent = theme === 'light' ? A.rgb : A.hirgb;\n    if (persist) {\n      try {\n        localStorage.setItem('sanket-theme', theme);\n        localStorage.setItem('sanket-accent', accent);\n      } catch (e) {}\n    }\n    requestAnimationFrame(() => this.applyVars());\n  }\n\n  toggleTheme = () => this.applyPrefs(this.state.theme === 'dark' ? 'light' : 'dark', this.state.accent, true);\n  pickGold = () => this.applyPrefs(this.state.theme, 'gold', true);\n  pickEmerald = () => this.applyPrefs(this.state.theme, 'emerald', true);\n  pickAzure = () => this.applyPrefs(this.state.theme, 'azure', true);\n  pickRose = () => this.applyPrefs(this.state.theme, 'rose', true);\n\n  openJoin = () => this.setState({ modalOpen: true, joinErr: '' });\n  closeJoin = () => this.setState({ modalOpen: false });\n  modalBackdrop = (e) => { if (e.target === e.currentTarget) this.closeJoin(); };\n  nameRef = (el) => { this.nameEl = el; };\n  phoneRef = (el) => { this.phoneEl = el; };\n  emailRef = (el) => { this.emailEl = el; };\n\n  submitJoin = async () => {\n    const name = this.nameEl ? this.nameEl.value.trim() : '';\n    const phone = this.phoneEl ? this.phoneEl.value.trim() : '';\n    const email = this.emailEl ? this.emailEl.value.trim() : '';\n    if (!na   }\n    this.runSequence(true);\n    this.timers.push(setInterval(() => this.tickPrice(), 1500));\n    this.timers.push(setInterval(() => this.runSequence(false), 15000));\n  }\n\n  componentWillUnmount() {\n    (this.timers || []).forEach(clearInterval);\n    (this.touts || []).forEach(clearTimeout);\n    if (this.cnt) clearInterval(this.cnt);\n    if (this.nraf) cancelAnimationFrame(this.nraf);\n    if (this.onKey) document.removeEventListener('keydown', this.onKey);\n  }\n\n  after(ms, fn) { this.touts.push(setTimeout(fn, ms)); }\n\n  runSequence(first) {\n    this.setState({ biz: 0, tech: 0, mkt: 0, conv: 0, status: 'reading three lenses…' });\n    this.after(450, () => this.setState({ biz: 83 }));\n    this.after(1000, () => this.setState({ tech: 83 }));\n    this.after(1550, () => this.setState({ mkt: 50 }));\n    this.after(2200, () => {\n      this.setState({ status: 'sizing the risk…' });\n      if (this.cnt) clearInterval(this.cnt);\n      let v = 0;\n      this.cnt = setInterval(() => {\n        v += 3;\n        if (v >= 70) {\n          v = 70;\n          clearInterval(this.cnt);\n          this.setState({ status: 'call sized · risk 1% · live' });\n        }\n        this.setState({ conv: v });\n      }, 34);\n    });\n    if (first) {\n      let c = 0;\n      const ci = setInterval(() => {\n        c += 1;\n        if (c >= 34) { c = 34; clearInterval(ci); }\n        this.setState({ calls: c });\n      }, 55);\n      this.timers.push(ci);\n    }\n  }\n\n  tickPrice() {\n    const d = (Math.random() - 0.47) * 0.6;\n    const p = Math.max(390, Math.min(400, this.state.price + d));\n    this.setState({ price: p, up: d >= 0 });\n  }\n\n  heroRef = (el) => {\n    if (!el || el === this.heroEl) return;\n    this.heroEl = el;\n    this.mx = -99999; this.my = -99999;\n    el.addEventListener('mousemove', (e) => {\n      if (!this.ncv) return;\n      const r = this.ncv.getBoundingClientRect();\n      this.mx = (e.clientX - r.left) * 2;\n      this.my = (e.clien
